name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-x86_64-pc-windows-msvc

      - name: Verify version matches tag
        shell: bash
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          # Normalize: append .0 if tag is major.minor without patch
          if [[ "$TAG_VERSION" =~ ^[0-9]+\.[0-9]+$ ]]; then
            TAG_VERSION="${TAG_VERSION}.0"
          fi
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Cargo.toml version ($CARGO_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Build release binary
        run: cargo build --release

      - name: Install cargo-wix
        run: cargo install cargo-wix

      - name: Add WiX to PATH
        shell: bash
        run: |
          # Find WiX install dir — path varies across runner images
          WIX_DIR=$(find "/c/Program Files (x86)" "/c/tools" -maxdepth 1 -iname "WiX*" -type d 2>/dev/null | head -1)
          if [ -z "$WIX_DIR" ]; then
            echo "ERROR: WiX Toolset not found"
            exit 1
          fi
          echo "Found WiX at: $WIX_DIR"
          echo "$WIX_DIR/bin" >> $GITHUB_PATH

      - name: Build MSI installer
        run: cargo wix --no-build --nocapture --package glass

      - name: Upload MSI to release
        uses: softprops/action-gh-release@v2
        with:
          files: target/wix/*.msi
          generate_release_notes: true
          body: |
            ## Installation

            | Platform | Download |
            |----------|----------|
            | Windows  | `.msi` installer |
            | macOS    | `.dmg` disk image |
            | Linux    | `.deb` package |

            > **macOS users:** If blocked by Gatekeeper, run `xattr -cr /Applications/Glass.app` or right-click > Open.

  build-macos:
    name: Build macOS Installer (${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
          - target: x86_64-apple-darwin
            arch: x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Verify version matches tag
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          # Normalize: append .0 if tag is major.minor without patch
          if [[ "$TAG_VERSION" =~ ^[0-9]+\.[0-9]+$ ]]; then
            TAG_VERSION="${TAG_VERSION}.0"
          fi
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Cargo.toml version ($CARGO_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Install x86_64 OpenSSL (for cross-compilation)
        if: matrix.target == 'x86_64-apple-darwin'
        run: |
          brew fetch --force --bottle-tag=sonoma openssl@3
          brew install "$(brew --cache --bottle-tag=sonoma openssl@3)" 2>/dev/null || true

      - name: Build release binary
        run: |
          if [ "${{ matrix.target }}" = "x86_64-apple-darwin" ]; then
            export OPENSSL_DIR="$(brew --prefix openssl@3)"
            export PKG_CONFIG_PATH="${OPENSSL_DIR}/lib/pkgconfig"
          fi
          cargo build --release --target ${{ matrix.target }}

      - name: Build DMG installer
        run: bash packaging/macos/build-dmg.sh "${GITHUB_REF_NAME#v}" "${{ matrix.target }}"

      - name: Create Homebrew tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p staging
          cp target/${{ matrix.target }}/release/glass staging/
          cp -r shell-integration staging/
          tar czf glass-${VERSION}-${{ matrix.target }}.tar.gz -C staging .

      - name: Upload tarball to release
        uses: softprops/action-gh-release@v2
        with:
          files: glass-*-${{ matrix.target }}.tar.gz

      - name: Upload DMG to release
        uses: softprops/action-gh-release@v2
        with:
          files: target/macos/*-${{ matrix.arch }}.dmg
          generate_release_notes: true
          body: |
            ## Installation

            | Platform | Download |
            |----------|----------|
            | Windows  | `.msi` installer |
            | macOS (Apple Silicon) | `.dmg` disk image (aarch64) |
            | macOS (Intel) | `.dmg` disk image (x86_64) |
            | Linux    | `.deb` package |

            > **macOS users:** If blocked by Gatekeeper, run `xattr -cr /Applications/Glass.app` or right-click > Open.

  build-linux:
    name: Build Linux Installer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-x86_64-unknown-linux-gnu

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev libx11-dev libxi-dev libxtst-dev

      - name: Verify version matches tag
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          # Normalize: append .0 if tag is major.minor without patch
          if [[ "$TAG_VERSION" =~ ^[0-9]+\.[0-9]+$ ]]; then
            TAG_VERSION="${TAG_VERSION}.0"
          fi
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Cargo.toml version ($CARGO_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Build release binary
        run: cargo build --release

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build deb package
        run: cargo deb --no-build

      - name: Create Homebrew tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p staging
          cp target/release/glass staging/
          cp -r shell-integration staging/
          tar czf glass-${VERSION}-x86_64-unknown-linux-gnu.tar.gz -C staging .

      - name: Upload tarball to release
        uses: softprops/action-gh-release@v2
        with:
          files: glass-*-x86_64-unknown-linux-gnu.tar.gz

      - name: Upload deb to release
        uses: softprops/action-gh-release@v2
        with:
          files: target/debian/*.deb
          generate_release_notes: true
          body: |
            ## Installation

            | Platform | Download |
            |----------|----------|
            | Windows  | `.msi` installer |
            | macOS    | `.dmg` disk image |
            | Linux    | `.deb` package |

            > **macOS users:** If blocked by Gatekeeper, run `xattr -cr /Applications/Glass.app` or right-click > Open.

  update-homebrew:
    name: Update Homebrew Formula
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Wait for release assets
        run: sleep 30

      - name: Download tarballs and compute SHA256
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"

          gh release download "$TAG" \
            --pattern "glass-*-aarch64-apple-darwin.tar.gz" \
            --pattern "glass-*-x86_64-apple-darwin.tar.gz" \
            --pattern "glass-*-x86_64-unknown-linux-gnu.tar.gz" \
            --dir ./tarballs

          SHA_ARM64=$(sha256sum ./tarballs/glass-*-aarch64-apple-darwin.tar.gz | awk '{print $1}')
          SHA_X86_64=$(sha256sum ./tarballs/glass-*-x86_64-apple-darwin.tar.gz | awk '{print $1}')
          SHA_LINUX=$(sha256sum ./tarballs/glass-*-x86_64-unknown-linux-gnu.tar.gz | awk '{print $1}')

          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "TAG=${TAG}" >> $GITHUB_ENV
          echo "SHA_ARM64=${SHA_ARM64}" >> $GITHUB_ENV
          echo "SHA_X86_64=${SHA_X86_64}" >> $GITHUB_ENV
          echo "SHA_LINUX=${SHA_LINUX}" >> $GITHUB_ENV

      - name: Generate formula
        run: |
          cat > glass.rb << 'FORMULA'
          class Glass < Formula
            desc "GPU-accelerated terminal emulator with AI integration"
            homepage "https://github.com/candyhunterz/Glass"
            version "VERSION_PLACEHOLDER"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/candyhunterz/Glass/releases/download/TAG_PLACEHOLDER/glass-VERSION_PLACEHOLDER-aarch64-apple-darwin.tar.gz"
                sha256 "SHA_ARM64_PLACEHOLDER"
              else
                url "https://github.com/candyhunterz/Glass/releases/download/TAG_PLACEHOLDER/glass-VERSION_PLACEHOLDER-x86_64-apple-darwin.tar.gz"
                sha256 "SHA_X86_64_PLACEHOLDER"
              end
            end

            on_linux do
              url "https://github.com/candyhunterz/Glass/releases/download/TAG_PLACEHOLDER/glass-VERSION_PLACEHOLDER-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "SHA_LINUX_PLACEHOLDER"
            end

            def install
              bin.install "glass"
              (share/"glass/shell-integration").install Dir["shell-integration/*"]
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/glass --version")
            end
          end
          FORMULA

          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" glass.rb
          sed -i "s/TAG_PLACEHOLDER/${TAG}/g" glass.rb
          sed -i "s/SHA_ARM64_PLACEHOLDER/${SHA_ARM64}/g" glass.rb
          sed -i "s/SHA_X86_64_PLACEHOLDER/${SHA_X86_64}/g" glass.rb
          sed -i "s/SHA_LINUX_PLACEHOLDER/${SHA_LINUX}/g" glass.rb

          echo "Generated formula:"
          cat glass.rb

      - name: Push to homebrew-glass
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone https://x-access-token:${TAP_TOKEN}@github.com/candyhunterz/homebrew-glass.git tap
          cp glass.rb tap/Formula/glass.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/glass.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update Glass to ${VERSION}"
          git push
