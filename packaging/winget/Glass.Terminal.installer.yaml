# Glass Terminal - Winget Installer Manifest
# This is a template for submitting to microsoft/winget-pkgs.
# Before submitting a PR for each release:
#   1. Update PackageVersion to match the release tag
#   2. Update InstallerUrl to point to the correct release MSI
#   3. Compute SHA256 from the actual MSI: certutil -hashfile glass-VERSION-x86_64.msi SHA256
#   4. Replace the <SHA256> placeholder with the computed hash

PackageIdentifier: Glass.Terminal
PackageVersion: "0.1.0"
MinimumOSVersion: "10.0.18362.0"
InstallerType: msi
InstallModes:
  - silent
  - silentWithProgress
UpgradeBehavior: install
Installers:
  - Architecture: x64
    InstallerUrl: https://github.com/<GITHUB_USER>/glass/releases/download/v0.1.0/glass-0.1.0-x86_64.msi
    InstallerSha256: <SHA256>
    UpgradeCode: D5F79758-7183-4EBE-9B63-DADD19B1D42C
ManifestType: installer
ManifestVersion: "1.6.0"
